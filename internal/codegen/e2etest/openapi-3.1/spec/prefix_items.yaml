openapi: "3.1.0"
info:
  title: Prefix Items / Tuple Test (OpenAPI 3.1)
  version: "1.0.0"
paths:
  /tuple:
    get:
      operationId: getTuple
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Measurement'
components:
  schemas:
    # Top-level tuple (positional, heterogeneous) -> []any.
    # prefixItems alone marks it as a tuple; `items: false` (JSON Schema's "no
    # additional items") is not representable by kin-openapi's *SchemaRef Items
    # field, so it is omitted.
    Point:
      type: array
      prefixItems:
        - type: number
        - type: number
    Measurement:
      type: object
      properties:
        # Tuple as an object property -> []any
        coords:
          type: array
          prefixItems:
            - type: string
            - type: integer
        # Tuple nested in an array item -> [][]any
        samples:
          type: array
          items:
            type: array
            prefixItems:
              - type: number
              - type: string
