openapi: "3.1.0"
info:
  title: Server Interface Test
  version: "1.0.0"
components:
  schemas:
    Pet:
      type: object
      required: [id, name]
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
paths:
  /pets:
    get:
      operationId: listPets
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Pet"
    post:
      operationId: createPet
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Pet"
      responses:
        "201":
          description: created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Pet"
  /pets/{pet_id}:
    get:
      operationId: getPet
      parameters:
        - name: pet_id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Pet"
    delete:
      operationId: deletePet
      parameters:
        - name: pet_id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "204":
          description: deleted
  /events:
    get:
      operationId: streamEvents
      x-ginx-sse: true
      parameters:
        - name: channel
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: SSE stream
          content:
            application/json:
              schema:
                type: object
  /notifications:
    get:
      operationId: streamNotifications
      parameters:
        - name: X-Auth-Token
          in: header
          required: true
          schema:
            type: string
      responses:
        "200":
          description: SSE via content-type
          content:
            text/event-stream:
              schema:
                type: string
