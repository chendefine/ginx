openapi: "3.0.3"
info:
  title: Complex Types Test
  version: "1.0.0"
components:
  schemas:
    PetStatus:
      type: string
      enum: [available, pending, sold]
    Priority:
      type: integer
      enum: [1, 2, 3]
    Pet:
      type: object
      required: [id, name, status]
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        status:
          $ref: "#/components/schemas/PetStatus"
        tags:
          type: array
          items:
            type: string
    PetList:
      type: array
      items:
        $ref: "#/components/schemas/Pet"
    Metadata:
      type: object
      additionalProperties:
        type: string
    DynamicMap:
      type: object
      additionalProperties: true
    ExtendedPet:
      allOf:
        - $ref: "#/components/schemas/Pet"
        - type: object
          properties:
            breed:
              type: string
            weight:
              type: number
              format: float
    CombinedRef:
      allOf:
        - $ref: "#/components/schemas/Pet"
    FlexibleData:
      oneOf:
        - type: object
          properties:
            text:
              type: string
        - type: object
          properties:
            number:
              type: integer
    AnyData:
      anyOf:
        - type: string
        - type: integer
    NestedObject:
      type: object
      required: [address]
      properties:
        address:
          type: object
          required: [city]
          properties:
            city:
              type: string
            zip:
              type: string
        contacts:
          type: array
          items:
            type: object
            properties:
              type:
                type: string
              value:
                type: string
paths:
  /pets:
    get:
      operationId: listPets
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PetList"
