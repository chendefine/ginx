openapi: "3.0.3"
info:
  title: Client SDK Test
  version: "1.0.0"
components:
  schemas:
    CreateItemInput:
      type: object
      required: [name]
      properties:
        name:
          type: string
        price:
          type: number
          format: float
paths:
  /items:
    get:
      operationId: listItems
      parameters:
        - name: page
          in: query
          schema:
            type: integer
        - name: limit
          in: query
          schema:
            type: integer
            format: int32
        - name: X-Tenant-ID
          in: header
          required: true
          schema:
            type: string
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: integer
                    name:
                      type: string
    post:
      operationId: createItem
      parameters:
        - name: X-Idempotency-Key
          in: header
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateItemInput"
      responses:
        "201":
          description: created
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: integer
  /items/{item_id}:
    get:
      operationId: getItem
      parameters:
        - name: item_id
          in: path
          required: true
          schema:
            type: integer
            format: int64
        - name: include_details
          in: query
          schema:
            type: boolean
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: integer
                    format: int64
                  name:
                    type: string
    put:
      operationId: updateItem
      parameters:
        - name: item_id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name:
                  type: string
                price:
                  type: number
                  format: float
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
    delete:
      operationId: deleteItem
      parameters:
        - name: item_id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "204":
          description: deleted
  /items/{item_id}/export:
    get:
      operationId: exportItem
      parameters:
        - name: item_id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: PDF export
          content:
            application/pdf:
              schema:
                type: string
                format: binary
  /items/{item_id}/description:
    get:
      operationId: getItemDescription
      parameters:
        - name: item_id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: Text description
          content:
            text/plain:
              schema:
                type: string
  /items/redirect:
    get:
      operationId: redirectToItems
      responses:
        "302":
          description: Redirect
  /items/upload:
    post:
      operationId: uploadItemImage
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [image]
              properties:
                image:
                  type: string
                  format: binary
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                type: object
                properties:
                  url:
                    type: string
  /auth/token:
    post:
      operationId: createToken
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required: [username, password]
              properties:
                username:
                  type: string
                password:
                  type: string
                remember:
                  type: boolean
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                type: object
                properties:
                  token:
                    type: string
