openapi: "3.0.3"
info:
  title: Type Mapping Test
  version: "1.0.0"
components:
  schemas:
    Event:
      type: object
      required: [id, created_at]
      properties:
        id:
          type: integer
          format: int64
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        duration:
          type: integer
          format: int64
        timestamps:
          type: array
          items:
            type: string
            format: date-time
        schedule:
          type: object
          additionalProperties:
            type: string
            format: date-time
paths:
  /events:
    get:
      operationId: listEvents
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Event"
